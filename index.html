<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperHub · 试卷共享平台</title>
<meta name="description" content="PaperHub 试卷资料共享平台 — 上传试卷、搜索资料、交流学习。支持 PDF、图片、Office 文档等多种格式。">
<meta name="keywords" content="试卷,资料,共享,学习,高考,真题,大学">
<meta property="og:title" content="PaperHub · 试卷共享平台">
<meta property="og:description" content="上传试卷、搜索资料、交流学习">
<meta property="og:type" content="website">
<meta property="og:url" content="https://cybpaperhub.icu">
<meta name="theme-color" content="#2563eb">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-ghost btn-small" id="menuBtn" style="font-size:1.2rem" aria-label="菜单" aria-controls="sidebar" aria-expanded="false">☰</button>
      <a href="#/" class="logo">Paper<span>Hub</span></a>
    </div>
    <nav class="nav-right">
      <span class="user-email" id="userInfo"></span>
      <button class="btn btn-outline btn-small" onclick="location.hash='#/upload'" id="upBtn" style="display:none">📤 上传</button>
      <button class="btn btn-outline btn-small" onclick="location.hash='#/favs'" id="favBtn" style="display:none">⭐ 收藏</button>
      <button class="btn btn-outline btn-small" onclick="location.hash='#/mine'" id="mineBtn" style="display:none">📂 我的</button>
      <button class="btn btn-outline btn-small" onclick="location.hash='#/friends'" id="friendsBtn" style="display:none">👥 好友</button>
      <button class="btn btn-outline btn-small" id="notifBell" style="display:none;position:relative" onclick="location.hash='#/notifications'">🔔<span id="notifBadge" class="notif-badge">0</span></button>
      <button class="btn btn-primary btn-small" onclick="location.hash='#/login'" id="loginBtn">登录</button>
      <button class="btn btn-outline btn-small" onclick="window._doLogout()" id="logoutBtn" style="display:none">退出</button>
    </nav>
  </div>
</header>

<div class="hero" id="hero">
  <div class="hero-inner">
    <div class="hero-title">知识共享，从这里开始</div>
    <div class="hero-subtitle">上传试卷、搜索资料、交流学习</div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">-</div>
        <div class="stat-label">资料总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statDL">-</div>
        <div class="stat-label">累计下载</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statUsers">-</div>
        <div class="stat-label">贡献用户</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">11</div>
        <div class="stat-label">涵盖学科</div>
      </div>
    </div>
  </div>
</div>

<main class="container content" id="main"></main>

<button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="toast" id="toast"></div>

<!-- Sidebar Menu -->
<div id="sidebar" class="sidebar" role="dialog" aria-modal="true" aria-labelledby="sidebarTitle" aria-hidden="true">
  <div class="sidebar-header">
    <span class="sidebar-title" id="sidebarTitle">PaperHub</span>
    <button class="btn btn-ghost btn-small" id="closeSidebar" aria-label="关闭">✕</button>
  </div>
  <div class="sidebar-nav">
    <a href="#/" class="btn btn-ghost sidebar-link" id="sideHome">🏠 首页</a>
    <a href="#/upload" class="btn btn-ghost sidebar-link" id="sideUpload" style="display:none">📤 上传资料</a>
    <a href="#/favs" class="btn btn-ghost sidebar-link" id="sideFavs" style="display:none">⭐ 我的收藏</a>
    <a href="#/mine" class="btn btn-ghost sidebar-link" id="sideMine" style="display:none">📂 我的上传</a>
    <a href="#/friends" class="btn btn-ghost sidebar-link" id="sideFriends" style="display:none">👥 好友</a>
    <a href="#/notifications" class="btn btn-ghost sidebar-link" id="sideNotifs" style="display:none">🔔 通知<span id="sideNotifBadge" class="notif-badge" style="position:relative;top:0;right:0;margin-left:6px">0</span></a>
    <div class="sidebar-divider"></div>
    <span id="sideUser" class="sidebar-user"></span>
    <a href="#/login" class="btn btn-ghost sidebar-link" id="sideLogin">🔐 登录</a>
    <a href="#" class="btn btn-ghost sidebar-link" id="sideLogout" style="display:none">退出登录</a>
  </div>
</div>
<div id="overlay" class="overlay"></div>

<script type="module">
/**
 * PaperHub — Main Entry Point
 *
 * Architecture:
 *   css/style.css    — All styles
 *   js/supabase.js   — Supabase client (auth + db + storage)
 *   js/utils.js      — Helpers (esc, timeAgo, toast, favs, delegate)
 *   js/pages.js      — Page renderers + actions (event delegation)
 *   js/router.js     — Hash router + auth guard
 */

import { init } from './js/router.js';
import * as pages from './js/pages.js';

// ── Sidebar toggle (only global handler needed) ──
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const menuBtn = document.getElementById('menuBtn');
const closeSidebar = document.getElementById('closeSidebar');

function openSidebar() {
  sidebar.classList.add('open');
  overlay.classList.add('active');
  document.body.classList.add('sidebar-open');
  sidebar.setAttribute('aria-hidden', 'false');
  menuBtn.setAttribute('aria-expanded', 'true');
  closeSidebar.focus();
}

function closeSidebarFn() {
  sidebar.classList.remove('open');
  overlay.classList.remove('active');
  document.body.classList.remove('sidebar-open');
  sidebar.setAttribute('aria-hidden', 'true');
  menuBtn.setAttribute('aria-expanded', 'false');
  menuBtn.focus();
}

menuBtn.addEventListener('click', openSidebar);
closeSidebar.addEventListener('click', closeSidebarFn);
overlay.addEventListener('click', closeSidebarFn);
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape' && sidebar.classList.contains('open')) {
    closeSidebarFn();
  }
});

// Close sidebar on link click
document.querySelectorAll('.sidebar-link').forEach(function (link) {
  link.addEventListener('click', closeSidebarFn);
});

// Sidebar logout
document.getElementById('sideLogout').addEventListener('click', function (e) {
  e.preventDefault();
  closeSidebarFn();
  pages.doLogout();
});

// ── Expose logout to global (needed for inline onclick in header) ──
window._doLogout = pages.doLogout;

// ── Back to top button ──
window.addEventListener('scroll', function () {
  document.getElementById('back-top').style.display = window.scrollY > 500 ? 'block' : 'none';
});

// ── Start the app ──
init();
</script>
</body>
</html>
