<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperHub · 试卷共享平台</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="#/" class="logo">Paper<span>Hub</span></a>
    <nav class="nav-right">
      <span class="user-email" id="userInfo"></span>
      <button class="btn btn-outline btn-small" onclick="location.hash='#/upload'" id="upBtn" style="display:none">上传</button>
      <button class="btn btn-outline btn-small" onclick="location.hash='#/favs'" id="favBtn" style="display:none">收藏</button>
      <button class="btn btn-outline btn-small" onclick="location.hash='#/mine'" id="mineBtn" style="display:none">我的</button>
      <button class="btn btn-primary btn-small" onclick="location.hash='#/login'" id="loginBtn">登录</button>
      <button class="btn btn-outline btn-small" onclick="window._doLogout()" id="logoutBtn" style="display:none">退出</button>
    </nav>
  </div>
</header>

<div class="hero" id="hero">
  <div class="hero-inner">
    <div class="hero-title">知识共享，从这里开始</div>
    <div class="hero-subtitle">上传试卷、搜索资料、交流学习</div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">-</div>
        <div class="stat-label">资料总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statDL">-</div>
        <div class="stat-label">累计下载</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statUsers">-</div>
        <div class="stat-label">贡献用户</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">11</div>
        <div class="stat-label">涵盖学科</div>
      </div>
    </div>
  </div>
</div>

<main class="container content" id="main"></main>

<button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="toast" id="toast"></div>

<script type="module">
/**
 * PaperHub — Main Entry Point
 *
 * Architecture:
 *   css/style.css    — All styles
 *   js/supabase.js   — Supabase client (auth + db + storage)
 *   js/utils.js      — Helpers (esc, timeAgo, toast, favs)
 *   js/pages.js      — Page renderers + actions
 *   js/router.js     — Hash router + auth guard
 */

import { init } from './js/router.js';
import * as pages from './js/pages.js';
import { toggleFavorite } from './js/utils.js';

// ── Expose functions to global scope (needed for inline onclick handlers) ──
// These are called from onclick attributes in dynamically rendered HTML

// Home
window._debounceSearch = pages.debounceSearch;
window._doSearch = pages.doSearch;
window._pickSubject = pages.pickSubject;
window._showAll = pages.showAll;

// Detail
window._download = pages.downloadFile;
window._preview = pages.previewFile;
window._showRateForm = pages.showRateForm;
window._setStar = pages.setStar;
window._submitReview = pages.submitReview;
window._deletePaper = pages.deletePaper;
window._toggleFav = toggleFavorite;

// Upload
window._doUpload = pages.doUpload;

// Auth
window._switchAuth = pages.switchAuthMode;
window._doAuth = pages.doAuth;
window._doLogout = pages.doLogout;

// ── Back to top button ──
window.addEventListener('scroll', function () {
  document.getElementById('back-top').style.display = window.scrollY > 500 ? 'block' : 'none';
});

// ── Start the app ──
init();
</script>
</body>
</html>
